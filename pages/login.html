<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOVI Cam — Entrar</title>
  <link rel="stylesheet" href="../src/css/login.css">
</head>
<body>
  <main class="login">
    <header class="cabecalho">
      <div class="logo">✦</div>
      <h1 class="titulo">JOVI Cam</h1>
      <p class="subtitulo">Entre para continuar</p>
    </header>

    <form class="form-login" id="form-login" novalidate>
      <div class="campo">
        <label class="label" for="email">Email</label>
        <input class="input" id="email" name="email" type="email" placeholder="voce@exemplo.com" autocomplete="email">
        <small class="msg-erro" id="erro-email"></small>
      </div>

      <div class="campo">
        <label class="label" for="senha">Senha</label>
        <input class="input" id="senha" name="senha" type="password" placeholder="Mínimo 6 caracteres" autocomplete="current-password">
        <small class="msg-erro" id="erro-senha"></small>
      </div>

      <button type="submit" class="btn-entrar">Entrar</button>

      <p class="rodape">
        Não tem uma conta? <a href="#" id="link-cadastro">Criar conta</a>
      </p>
    </form>
  </main>

  <script src="../src/js/login.js"></script>
</body>
</html>
